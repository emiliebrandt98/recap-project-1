<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <link rel="stylesheet" href="./styles.css" />
    <title>Friends Quiz</title>
  </head>

  <body>
    <header class="title">
      <h1>Friends Quiz</h1>
    </header>

    <main class="main-content">
      <section class="id">
        <div class="id__img">
          <img
            class="id__img-icon"
            src="./assets/user.png"
            alt="User Profilimage"
          />
        </div>
        <h2>Max Doe</h2>
      </section>

      <section class="about">
        <h3>About me</h3>
        <p>
          Lorem ipsum dolor sit amet, consetetur sadipscing elitr, sed diam
          nonumy eirmod tempor invidunt ut labore et dolore magna aliquyam erat,
          sed diam voluptua. At vero eos et accusam et justo duo dolores et ea
          rebum.
        </p>
      </section>

      <section class="counter">
        <button class="counter__btn" aria-label="12 Questions and Answers">
          <img
            class="counter__btn-img"
            src="./assets/question-and-answer.png"
            alt=""
          />
          <p aria-hidden="true">12</p>
        </button>
        <button class="counter__btn" aria-label="4 Bookmark">
          <img
            class="counter__btn-img"
            src="./assets/bookmark-active.png"
            alt=""
          />
          <p aria-hidden="true">4</p>
        </button>
      </section>

      <section class="settings">
        <h3>Settings</h3>
        <article class="settings__darkmode">
          <p>Dark Mode</p>
          <button class="settings__toogle-button" aria-pressed="true/false">
            <div class="settings__toogle-button--circle"></div>
          </button>
        </article>
      </section>
    </main>

    <footer>
      <nav class="footer-navbar" aria-label="main-navigation">
        <a href="./index.html" class="footer-navbar__btn-home">
          <img
            class="footer-navbar__btn--icon"
            src="./assets/home.png"
            alt="Home Page"
          />
        </a>

        <a href="./bookmarks.html" class="footer-navbar__btn-bookmark">
          <img
            class="footer-navbar__btn--icon"
            src="./assets/bookmark.png"
            alt="Bookmark Page"
          />
        </a>

        <a href="./form.html" class="footer-navbar__btn-form">
          <img
            class="footer-navbar__btn--icon"
            src="./assets/add.png"
            alt="Add Page"
          />
        </a>

        <a
          href="./profile.html"
          class="footer-navbar__btn-profil active"
          aria-current="page"
        >
          <img
            class="footer-navbar__btn--icon"
            src="./assets/user-active.png"
            alt="Profil Page"
          />
        </a>
      </nav>
    </footer>
  </body>
</html>
