<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <link rel="stylesheet" href="./styles.css" />
    <title>Friends Quiz</title>
  </head>

  <body>
    <header class="title">
      <h1>Friends Quiz</h1>
    </header>

    <main class="main-content">
      <section class="id">
        <div class="id__img">
          <img class="id__img-icon" src="./assets/user.png" alt="User Profil" />
        </div>
        <h2>Max Doe</h2>
      </section>

      <section class="about">
        <h3>About me</h3>
        <p>
          Lorem ipsum dolor sit amet, consetetur sadipscing elitr, sed diam
          nonumy eirmod tempor invidunt ut labore et dolore magna aliquyam erat,
          sed diam voluptua. At vero eos et accusam et justo duo dolores et ea
          rebum.
        </p>
      </section>

      <section class="counter">
        <button class="counter__btn">
          <img
            class="counter__btn-img"
            src="./assets/question-and-answer.png"
            alt="Questions and Answers Counter"
          />
          <p>12</p>
        </button>
        <button class="counter__btn">
          <img
            class="counter__btn-img"
            src="./assets/bookmark-active.png"
            alt="Bookmark Counter"
          />
          <p>4</p>
        </button>
      </section>

      <section class="settings">
        <h3>Settings</h3>
        <article class="settings__darkmode">
          <p>Dark Mode</p>
          <div class="settings__toogle-button">
            <div class="settings__toogle-button--circle"></div>
          </div>
        </article>
      </section>
    </main>

    <footer class="footer-navbar">
      <a href="./index.html" class="footer-navbar__btn-home">
        <img
          class="footer-navbar__btn--icon"
          src="./assets/home.png"
          alt="Home Page"
        />
      </a>
      <a href="./bookmarks.html" class="footer-navbar__btn-bookmark">
        <img
          class="footer-navbar__btn--icon"
          src="./assets/bookmark.png"
          alt="Bookmark Page"
        />
      </a>
      <a
        href="./profile.html"
        class="footer-navbar__btn-profil active"
        aria-current="page"
      >
        <img
          class="footer-navbar__btn--icon"
          src="./assets/user-active.png"
          alt="Profil Page"
        />
      </a>
    </footer>
  </body>
</html>
